name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Adjust this to your primary branch name

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create config.js from secrets
        run: |
          cat <<EOF > src/js/config.js
          export const SUPABASE_URL = '${{ secrets.SUPABASE_URL }}';
          export const SUPABASE_KEY = '${{ secrets.SUPABASE_KEY }}';
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
