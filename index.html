      // ==========================================
      // 3. APLICATIVO REACT PRINCIPAL
      // ==========================================
      function App() {
        const [employees, setEmployees] = useState([]);
        const [epiFuncaoRules, setEpiFuncaoRules] = useState([]);
        const [isLoadingData, setIsLoadingData] = useState(true);

        const [isAuthChecking, setIsAuthChecking] = useState(true);

        useEffect(() => {
          checkUser();
        }, []);

        async function checkUser() {
          try {
            const {
              data: { session },
            } = await supabase.auth.getSession();
            if (!session) {
              window.location.href = "login.html";
              return;
            }

            const { data: profile } = await supabase
              .from("profiles")
              .select("status")
              .eq("id", session.user.id)
              .single();

            if (!profile || profile.status !== "aprovado") {
              window.location.href = "login.html";
              return;
            }

            setIsAuthChecking(false);
          } catch (error) {
            console.error("Error checking auth:", error);
            window.location.href = "login.html";
          }
        }

        const handleLogout = async () => {
          await supabase.auth.signOut();
          window.location.href = "login.html";
        };

        // Helper to calculate status based on date
        const calculateStatus = (dateStr, nowTime) => {
          if (!dateStr) return "pendente";

          const trimmedDateStr = dateStr.trim();
          if (trimmedDateStr === "") return "pendente";

          let dateObj;

          const slash1 = trimmedDateStr.indexOf("/");
          if (slash1 !== -1) {
            const slash2 = trimmedDateStr.indexOf("/", slash1 + 1);
            if (slash2 !== -1) {
              // format is DD/MM/YYYY
              dateObj = new Date(
                trimmedDateStr.substring(slash2 + 1),
                trimmedDateStr.substring(slash1 + 1, slash2) - 1,
                trimmedDateStr.substring(0, slash1),
              );
            } else {
              dateObj = new Date(trimmedDateStr);
            }
          } else {
            const dash1 = trimmedDateStr.indexOf("-");
            if (dash1 !== -1) {
              const dash2 = trimmedDateStr.indexOf("-", dash1 + 1);
              if (dash2 !== -1) {
                // format might be YYYY-MM-DD
                dateObj = new Date(
                  trimmedDateStr.substring(0, dash1),
                  trimmedDateStr.substring(dash1 + 1, dash2) - 1,
                  trimmedDateStr.substring(dash2 + 1),
                );
              } else {
                dateObj = new Date(trimmedDateStr);
              }
            } else {
              dateObj = new Date(trimmedDateStr);
            }
          }

          const time = dateObj.getTime();
          if (isNaN(time)) return "pendente";

          const diffTime = Math.abs(nowTime - time);
          const diffDays = Math.ceil(diffTime / 86400000); // 1000 * 60 * 60 * 24

          return diffDays < 180 ? "em_dia" : "vencido";
        };

        const mapDataToState = (data) => {
          const nowTime = Date.now();

          return data.map((row) => {
            const name = row.nome || "";

            let initials = "??";
            const trimmedName = name.trim();
            if (trimmedName) {
              const firstChar = trimmedName[0];
              const lastSpaceIndex = trimmedName.lastIndexOf(" ");
              if (
                lastSpaceIndex !== -1 &&
                lastSpaceIndex < trimmedName.length - 1
              ) {
                initials = firstChar + trimmedName[lastSpaceIndex + 1];
              } else {
                initials =
                  trimmedName.length > 1
                    ? trimmedName.substring(0, 2)
                    : firstChar;
              }
            }

            const epiData = row.epi_data;
            const fardamentoData = row.fardamento_data;

            const epiDataTrimmed = epiData ? epiData.trim() : "";
            const fardamentoDataTrimmed = fardamentoData
              ? fardamentoData.trim()
              : "";

            return {
              id: row.id,
              nome: name,
              nomeLower: name.toLowerCase(),
              cargo: row.funcao || "Não especificado",
              setor: row.setor || "Não especificado",
              cpf: row.cpf || "Não informado",
              unidade: row.unidade || "Padrão",
              admissao: row.admissao || "",
              avatar: initials.toUpperCase(),
              epi: {
                status: calculateStatus(epiData, nowTime),
                ultimaEntrega: epiDataTrimmed !== "" ? epiDataTrimmed : null,
                validade: "180 dias",
                link: row.epi_link || null,
                itens: row.epi_itens || null,
              },
              fardamento: {
                status: calculateStatus(fardamentoData, nowTime),
                ultimaEntrega:
                  fardamentoDataTrimmed !== "" ? fardamentoDataTrimmed : null,
                validade: "1 ano",
                link: row.fardamento_link || null,
                itens: row.fardamento_itens || null,
              },
            };
          });
        };

        const fetchEpiFuncaoRules = async () => {
          try {
            const { data, error } = await supabase
              .from("epi_funcao")
              .select("*");
            if (error) throw error;
            if (data) setEpiFuncaoRules(data);
          } catch (err) {
            console.error("Failed to fetch epi_funcao rules:", err);
          }
        };

        const fetchEmpresas = async () => {
          try {
            const { data, error } = await supabase
              .from("empresas")
              .select("*")
              .order("id", { ascending: true });
            if (error) throw error;
            setEmpresas(data);
            if (data.length > 0) {
              // Default to Nunes & Vieira (id 1 usually)
              const defaultEmp =
                data.find((e) => e.nome.includes("NUNES")) || data[0];
              setSelectedEmpresaId(defaultEmp.id);
            }
          } catch (error) {
            console.error("Error fetching empresas:", error);
          }
        };

        const fetchEmployees = async () => {
          try {
            const { data, error } = await supabase
              .from("funcionarios_epi")
              .select("*")
              .order("nome", { ascending: true });

            if (error) throw error;

            if (data) {
              setEmployees(mapDataToState(data));
            }
          } catch (err) {
            console.error("Failed to fetch from Supabase table:", err);
          } finally {
            setIsLoadingData(false);
          }
        };

        useEffect(() => {
          if (!isAuthChecking) {
            fetchEmployees();
            fetchEmpresas();
            fetchEpiFuncaoRules();

            // Set up Realtime subscription
            const channel = supabase
              .channel("schema-db-changes")
              .on(
                "postgres_changes",
                { event: "*", schema: "public", table: "funcionarios_epi" },
                (payload) => {
                  console.log("Realtime change received!", payload);
                  // For simplicity and accuracy, re-fetch all data on change.
                  // For huge datasets, we'd update state based on payload.
                  fetchEmployees();
                  fetchEpiFuncaoRules();
                },
              )
              .subscribe();

            return () => {
              supabase.removeChannel(channel);
            };
          }
        }, [isAuthChecking]);

        const [searchTerm, setSearchTerm] = useState("");
        const [selectedEmpId, setSelectedEmpIdState] = useState(null);
        const setSelectedEmpId = (id) => {
          setSelectedEmpIdState(id);
          if (id) {
            window.history.pushState(
              { viewMode: "controle", selectedEmpId: id },
              "",
              "",
            );
          } else {
            window.history.pushState(
              { viewMode: "controle", selectedEmpId: null },
              "",
              "",
            );
          }
        };
        const [activeTab, setActiveTab] = useState("epi");
        const [dashboardFilter, setDashboardFilter] = useState("geral");
        const [viewMode, setViewModeState] = useState("dashboard");
        const setViewMode = (mode) => {
          setViewModeState(mode);
          if (mode === "controle") {
            window.history.pushState({ viewMode: "controle" }, "", "");
          } else {
            window.history.pushState({ viewMode: "dashboard" }, "", "");
          }
        };

        useEffect(() => {
          window.history.replaceState({ viewMode: "dashboard" }, "", "");

          const handlePopState = (event) => {
            if (event.state && event.state.viewMode) {
              setViewModeState(event.state.viewMode);
              if (event.state.viewMode === "dashboard") {
                setSelectedEmpIdState(null);
              }
            }
            if (event.state && event.state.selectedEmpId !== undefined) {
              setSelectedEmpIdState(event.state.selectedEmpId);
            }
          };
          window.addEventListener("popstate", handlePopState);
          return () => window.removeEventListener("popstate", handlePopState);
        }, []);

        const [stagedItems, setStagedItems] = useState([]);
        const [newItemCA, setNewItemCA] = useState("");
        const [newItemQtd, setNewItemQtd] = useState(1);
        const [hasLoadedHistory, setHasLoadedHistory] = useState(false);
        const [isEditModalOpen, setIsEditModalOpen] = useState(false);
        const [editingItem, setEditingItem] = useState(null);
        const [newItemName, setNewItemName] = useState("");
        const [newDeliveryDate, setNewDeliveryDate] = useState("");
        const [newLink, setNewLink] = useState("");
        const [empresas, setEmpresas] = useState([]);
        const [selectedEmpresaId, setSelectedEmpresaId] = useState(null);
        const scrollContainerRef = useRef(null);
        const getAllowedItemsForRole = (funcao, tab) => {
          if (!funcao || !epiFuncaoRules.length) return [];
          const roleRule = epiFuncaoRules.find(
            (r) => r.funcao.toUpperCase() === funcao.toUpperCase(),
          );
          if (!roleRule) return [];

          let allowed = [];
          if (tab === "epi") {
            if (roleRule.capacete) allowed.push("Capacete");
            if (roleRule.protetor_auricular) allowed.push("Protetor Auricular");
            if (roleRule.colete_refletivo) allowed.push("Colete Refletivo");
            if (roleRule.protetor_dorsal) allowed.push("Protetor Dorsal");
            if (roleRule.luva) allowed.push("Luva");
            if (roleRule.calca) allowed.push("Calça");
            if (roleRule.bota) allowed.push("Bota");
          } else if (tab === "fardamento") {
            if (roleRule.camisa) allowed.push("Camisa");
            if (roleRule.regata) allowed.push("Regata");
            if (roleRule.camisa_copa) allowed.push("Camisa Copa");
          }
          return allowed;
        };

        const parseItemString = (itemsStr, defaultDate, defaultLink) => {
          if (!itemsStr) return [];
          // Split by ';' and clean up
          const parts = itemsStr
            .split(";")
            .map((s) => s.trim())
            .filter(Boolean);
          return parts.map((part, index) => {
            // Match "Nome (CA: valor, Qtd: valor)" or just "Nome"
            const match = part.match(
              /^(.*?)\s*\((?:CA:\s*(.*?),\s*)?Qtd:\s*(.*?)\)$/i,
            );
            if (match) {
              return {
                id: Date.now() + Math.random() + index,
                nomeItem: match[1].trim(),
                ca: (match[2] || "").trim(),
                qtd: match[3].trim(),
                dataEntrega:
                  defaultDate || new Date().toISOString().split("T")[0],
                linkComprovante: defaultLink || "",
              };
            } else {
              return {
                id: Date.now() + Math.random() + index,
                nomeItem: part,
                ca: "",
                qtd: "1",
                dataEntrega:
                  defaultDate || new Date().toISOString().split("T")[0],
                linkComprovante: defaultLink || "",
              };
            }
          });
        };

        const loadHistoryIntoStaged = () => {
          const emp = employees.find((e) => e.id === selectedEmpId);
          if (!emp) return;

          const itemData = activeTab === "epi" ? emp.epi : emp.fardamento;

          if (itemData && itemData.itens) {
            // Convert stored DD/MM/YYYY to YYYY-MM-DD for the input type="date"
            let isoDate = new Date().toISOString().split("T")[0]; // Default to today

            const parsedItems = parseItemString(
              itemData.itens,
              isoDate,
              itemData.link,
            );
            setStagedItems(parsedItems);
          }
          setHasLoadedHistory(true);
        };

        // Reset history loaded flag when changing employee or tab
        useEffect(() => {
          setHasLoadedHistory(false);
          setStagedItems([]);
          setNewItemName("");
          setNewItemCA("");
          setNewItemQtd(1);
        }, [selectedEmpId, activeTab]);

        useEffect(() => {
          if (selectedEmpId !== null) {
            window.scrollTo({ top: 0, behavior: "auto" });
            if (scrollContainerRef.current) {
              scrollContainerRef.current.scrollTop = 0;
            }
          }
        }, [selectedEmpId]);

        useEffect(() => {
          setStagedItems([]);
          setNewItemName("");
          setNewDeliveryDate("");
          setNewLink("");
        }, [selectedEmpId, activeTab]);

        const filteredEmployees = useMemo(() => {
          const lowerSearch = searchTerm.toLowerCase();
          return employees.filter((emp) => emp.nomeLower.includes(lowerSearch));
        }, [employees, searchTerm]);

        const selectedEmployee = useMemo(() => {
          return employees.find((emp) => emp.id === selectedEmpId);
        }, [employees, selectedEmpId]);

        const getEmployeeStatus = (emp) => {
          if (dashboardFilter === "epi") {
            if (!emp.epi.ultimaEntrega) return "sem_entrega";
            if (emp.epi.status === "vencido") return "vencido";
            return "em_dia";
          }
          if (dashboardFilter === "fardamento") {
            if (!emp.fardamento.ultimaEntrega) return "sem_entrega";
            if (emp.fardamento.status === "vencido") return "vencido";
            return "em_dia";
          }
          // Default: geral
          if (!emp.epi.ultimaEntrega && !emp.fardamento.ultimaEntrega)
            return "sem_entrega";
          if (
            emp.epi.status === "vencido" ||
            emp.fardamento.status === "vencido"
          )
            return "vencido";
          return "em_dia";
        };

        const kpis = useMemo(() => {
          let emDia = 0,
            vencidos = 0,
            semRegistro = 0;
          employees.forEach((emp) => {
            const status = getEmployeeStatus(emp);
            if (status === "sem_entrega") semRegistro++;
            else if (status === "vencido") vencidos++;
            else if (status === "em_dia") emDia++;
          });
          const taxaConformidade =
            employees.length > 0
              ? Math.round((emDia / employees.length) * 100)
              : 0;
          return { emDia, vencidos, semRegistro, taxaConformidade };
        }, [employees, dashboardFilter]);

        const handleAddStagedItem = (e) => {
          e.preventDefault();
          if (!newItemName || !newDeliveryDate) return;

          if (!hasLoadedHistory) {
            loadHistoryIntoStaged();
          }

          const newItem = {
            id: Date.now() + Math.random(),
            nomeItem: newItemName,
            ca: newItemCA,
            qtd: newItemQtd,
            dataEntrega: newDeliveryDate,
            linkComprovante: newLink,
          };

          setStagedItems((prev) => [...prev, newItem]);
          setNewItemName("");
          setNewItemCA("");
          setNewItemQtd(1);
          // Keep newDeliveryDate and newLink as they were
        };

        const handleEditClick = (item) => {
          setEditingItem({ ...item });
          setIsEditModalOpen(true);
        };

        const handleSaveEdit = (e) => {
          e.preventDefault();
          setStagedItems((prev) =>
            prev.map((item) =>
              item.id === editingItem.id ? editingItem : item,
            ),
          );
          setIsEditModalOpen(false);
          setEditingItem(null);
        };

        const handleRemoveStagedItem = (idToRemove) => {
          setStagedItems((prev) =>
            prev.filter((item) => item.id !== idToRemove),
          );
        };

        const generatePDF = (emp, items, dateStr, empresaInfo) => {
          const empNome = empresaInfo?.nome || "NUNES & VIEIRA LOGISTICA LTDA";
          const empCnpj = empresaInfo?.cnpj || "48.986.353/0001-39";
          const empEnd =
            empresaInfo?.endereco ||
            "Tv São Pedro, 426, CEP: 45.604-570, Itabuna/BA";

          // Create a hidden div for the PDF content
          const container = document.createElement("div");
          container.style.position = "absolute";
          container.style.left = "0";
          container.style.opacity = "0";
          container.style.pointerEvents = "none";
          container.style.zIndex = "-9999";
          container.style.top = "0";

          // Add the layout HTML
          container.innerHTML = `

                      </div>
                      <div className="flex gap-3 mt-6">
                        <button
                          type="button"
                          onClick={() => setIsEditModalOpen(false)}
                          className="flex-1 bg-white hover:bg-gray-50 text-gray-600 font-bold py-2.5 px-4 rounded-xl border border-gray-200 transition-colors"
                        >
                          Cancelar
                        </button>
                        <button
                          type="submit"
                          className="flex-1 bg-[#002060] hover:bg-[#001848] text-white font-bold py-2.5 px-4 rounded-xl transition-colors"
                        >
                          Salvar Alterações
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      // Renderização Final
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
